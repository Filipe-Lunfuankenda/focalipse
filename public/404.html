<!doctype html>
<html lang="pt-PT">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="refresh" content="0; url=/focalipse/" />
    <script>
      (function redirectToSpaPath() {
        var segmentCount = 1;
        var l = window.location;
        var newPath =
          l.protocol +
          '//' +
          l.hostname +
          (l.port ? ':' + l.port : '') +
          l.pathname.split('/').slice(0, 1 + segmentCount).join('/') +
          '/?' +
          l.pathname
            .slice(1)
            .split('/')
            .slice(segmentCount)
            .join('/')
            .replace(/&/g, '~and~') +
          (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
          l.hash;

        l.replace(newPath);
      })();
    </script>
    <title>Focalipse</title>
  </head>
  <body>
    <p>Redirecionando para o Focalipse...</p>
  </body>
</html>
